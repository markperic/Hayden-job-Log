name: Deploy to GitHub Pages

# Builds the Expo web app on every push to main and publishes the static
# bundle to GitHub Pages at https://markperic.github.io/Hayden-job-Log/

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you trigger a manual deploy from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Stop overlapping deploys; the most recent push wins.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Export Expo web build
        run: npx expo export --platform web

      # GitHub Pages serves /404.html for any path it doesn't recognise.
      # We point it at the same SPA entry so deep links keep working.
      - name: SPA fallback (copy index.html to 404.html)
        run: cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
