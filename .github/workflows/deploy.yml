https://github.com/markperic/Hayden-job-Log/new/main

Step 2 — Name the file
At the very top of the page there's a single text field that says "Name your file…". Click in it and type this exactly (including the dots and slashes):

.github/workflows/deploy.yml
The slashes will auto-create the folder structure as you type.

Step 3 — Paste the YAML
Click in the big code editor below the filename field. Make sure it's completely empty. Then paste this whole block:

name: Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: yarn install
      - run: npx expo export --platform web
      - run: cp dist/index.html dist/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/deploy-pages@v4
